<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 144" role="img" aria-labelledby="title desc">
    <title id="title">Dr. Mira Solvay</title>
    <desc id="desc">A polished 3/4-view game sprite of Dr. Mira Solvay, an encapsulation scientist in a white lab coat with red goggles and a sample vial.</desc>
    <defs>
        <linearGradient id="skin" x1="35" y1="27" x2="73" y2="72" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#e7aa83" />
            <stop offset="0.62" stop-color="#c37b5d" />
            <stop offset="1" stop-color="#93513e" />
        </linearGradient>
        <linearGradient id="hair" x1="24" y1="16" x2="74" y2="70" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#2f171c" />
            <stop offset="0.55" stop-color="#171014" />
            <stop offset="1" stop-color="#070506" />
        </linearGradient>
        <linearGradient id="coat" x1="29" y1="68" x2="84" y2="123" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fff9ee" />
            <stop offset="0.54" stop-color="#ede5d6" />
            <stop offset="1" stop-color="#c9c0af" />
        </linearGradient>
        <linearGradient id="red" x1="33" y1="49" x2="92" y2="113" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ff8479" />
            <stop offset="0.5" stop-color="#ff3b30" />
            <stop offset="1" stop-color="#a91514" />
        </linearGradient>
        <linearGradient id="glass" x1="38" y1="49" x2="70" y2="63" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#e5fbff" stop-opacity="0.95" />
            <stop offset="1" stop-color="#52b8c8" stop-opacity="0.38" />
        </linearGradient>
        <filter id="sprite-shadow" x="-25%" y="-16%" width="150%" height="135%">
            <feDropShadow dx="0" dy="6" stdDeviation="3.8" flood-color="#000000" flood-opacity="0.45" />
        </filter>
    </defs>

    <ellipse cx="56" cy="132" rx="31" ry="8" fill="#000" opacity="0.34" />

    <g filter="url(#sprite-shadow)" stroke="#11161b" stroke-linecap="round" stroke-linejoin="round">
        <!-- Compact 3/4 stance: asymmetric arms and feet make the sprite feel alive. -->
        <path d="M28 76c-7 10-9 25-6 41 1 5 5 8 10 7s8-5 7-10c-2-10-1-21 5-30z" fill="#ded5c5" stroke-width="4" />
        <path d="M74 76c12 7 20 20 23 39 1 5-2 9-7 10s-9-2-10-7c-2-12-7-21-16-27z" fill="#ded5c5" stroke-width="4" />

        <path d="M32 68c7-8 16-12 28-12 13 0 24 5 31 14l-6 51c-6 8-15 12-28 12-12 0-22-4-29-12z" fill="url(#coat)" stroke-width="4" />
        <path d="M38 70l17 21-11 39c-7-1-12-4-16-9z" fill="#fff8ec" opacity="0.96" />
        <path d="M83 70L62 92l13 38c5-2 9-5 11-9z" fill="#d9d0c0" opacity="0.95" />
        <path d="M57 62l4 70" fill="none" stroke-width="4" opacity="0.88" />
        <path d="M47 72l13 22 16-22" fill="none" stroke="url(#red)" stroke-width="6" />
        <path d="M69 96h15c2 0 3 1 3 3v7c0 2-1 3-3 3H69z" fill="url(#red)" stroke-width="2.5" />
        <path d="M75 97v11" stroke="#fff6e8" stroke-width="2.4" opacity="0.9" />

        <path d="M39 118h14v15c0 5-4 8-10 8s-9-3-9-8z" fill="#252c34" stroke-width="4" />
        <path d="M61 117h15v15c0 6-4 9-10 9s-10-3-10-9z" fill="#252c34" stroke-width="4" />
        <path d="M31 135c7-5 17-5 24-1v6H27c0-2 1-4 4-5z" fill="#0c0f13" stroke-width="3" />
        <path d="M56 134c8-4 18-4 25 1 3 1 4 3 4 5H56z" fill="#0c0f13" stroke-width="3" />

        <path d="M88 88h12v34c0 5-3 8-6 8s-6-3-6-8z" fill="url(#red)" stroke-width="3.2" />
        <path d="M87 83h14v8H87z" fill="#20272f" stroke-width="3" />
        <path d="M91 96h6" stroke="#fff8ec" stroke-width="2.3" opacity="0.82" />

        <!-- Head is larger than realistic, but not mascot-large; this keeps identity readable. -->
        <path d="M25 39c2-18 16-30 34-30 23 0 39 16 38 39-1 22-16 37-37 37-20 0-35-17-35-46z" fill="url(#hair)" stroke-width="4" />
        <path d="M29 47c0-21 13-35 32-35 20 0 34 15 34 36 0 23-14 38-34 38S29 70 29 47z" fill="url(#skin)" stroke-width="4" />
        <path d="M27 43c4-22 20-34 41-29 15 4 25 17 27 34-20-2-34-8-44-19-4 9-12 14-24 14z" fill="url(#hair)" stroke-width="4" />
        <path d="M29 40c-7 8-7 23 0 35-9-5-14-20-9-30 2-4 5-6 9-5z" fill="url(#hair)" stroke-width="4" />
        <path d="M91 42c6 5 7 20 0 32 1-12 1-23 0-32z" fill="#090608" stroke-width="4" />

        <!-- Smaller goggles: strong hook without dominating the whole character. -->
        <path d="M38 50h17c5 0 8 3 8 8v5c0 5-3 8-8 8H39c-5 0-8-3-8-8v-5c0-5 3-8 7-8z" fill="#12191f" stroke="url(#red)" stroke-width="4" />
        <path d="M66 50h15c5 0 8 3 8 8v5c0 5-3 8-8 8H66c-5 0-8-3-8-8v-5c0-5 3-8 8-8z" fill="#12191f" stroke="url(#red)" stroke-width="4" />
        <path d="M59 60h4" stroke="#ff3b30" stroke-width="4" />
        <path d="M39 55h11" stroke="url(#glass)" stroke-width="3" />
        <path d="M68 55h9" stroke="url(#glass)" stroke-width="3" />
        <circle cx="45" cy="63" r="2" fill="#efffff" opacity="0.62" stroke="none" />
        <circle cx="73" cy="63" r="2" fill="#efffff" opacity="0.62" stroke="none" />
        <path d="M51 77c7 4 15 4 22-1" fill="none" stroke="#623022" stroke-width="3" />

        <path d="M35 80c-4 9-5 22-1 36" fill="none" stroke="#fff8ec" stroke-width="4" opacity="0.72" />
        <path d="M82 81c6 8 10 20 12 34" fill="none" stroke="#fff8ec" stroke-width="4" opacity="0.48" />
        <path d="M39 32c7-9 19-13 31-9" fill="none" stroke="#553037" stroke-width="4" opacity="0.62" />
    </g>
</svg>
